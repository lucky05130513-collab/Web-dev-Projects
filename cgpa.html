<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Responsive CGPA Calculator</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: black;
      padding: 35px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 0px 15px rgba(255,255,255,0.2);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }

    th {
      background: grey;
      color: white;
    }

    input {
      width: 90%;
      padding: 8px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid #aaa;
    }

    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0056b3;
    }

    .remove-btn {
      background: red;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .remove-btn:hover {
      background: darkred;
    }

    #result {
      background: gold;
      margin-top: 20px;
      padding: 15px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: green;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Advanced CGPA Calculator</h1>

  <table id="cgpaTable">

    <tr>
      <th>Subject Name</th>
      <th>Credits</th>
      <th>Grade Point</th>
      <th>Action</th>
    </tr>

    <tr>
      <td><input type="text" placeholder="Subject Name"></td>
      <td><input type="number" class="credit" step="0.5"></td>
      <td><input type="number" class="grade" min="0" max="10"></td>
      <td>
        <button class="remove-btn" onclick="removeRow(this)">
          Remove
        </button>
      </td>
    </tr>

  </table>

  <button class="btn" onclick="addRow()">
    Add Subject
  </button>

  <button class="btn" onclick="calculateCGPA()">
    Calculate CGPA
  </button>

  <div id="result">
    Your CGPA Will Appear Here
  </div>

</div>

<script>

function addRow() {

  let table = document.getElementById("cgpaTable");

  let row = table.insertRow();

  row.innerHTML = `

    <td>
      <input type="text" placeholder="Subject Name">
    </td>

    <td>
      <input type="number" class="credit" step="0.5">
    </td>

    <td>
      <input type="number" class="grade" min="0" max="10">
    </td>

    <td>
      <button class="remove-btn" onclick="removeRow(this)">
        Remove
      </button>
    </td>

  `;
}

function removeRow(button) {

  let row = button.parentNode.parentNode;

  row.remove();
}

function calculateCGPA() {

  let credits =
    document.querySelectorAll(".credit");

  let grades =
    document.querySelectorAll(".grade");

  let totalCredits = 0;

  let totalPoints = 0;

  for(let i = 0; i < credits.length; i++) {

    let credit =
      parseFloat(credits[i].value) || 0;

    let grade =
      parseFloat(grades[i].value) || 0;

    totalCredits += credit;

    totalPoints += credit * grade;
  }

  if(totalCredits === 0) {

    document.getElementById("result").innerHTML =
      "Please Enter Valid Data";

    return;
  }

  let cgpa =
    (totalPoints / totalCredits).toFixed(2);

  document.getElementById("result").innerHTML =
    "Your CGPA is : " + cgpa;
}

</script>

</body>
</html>
